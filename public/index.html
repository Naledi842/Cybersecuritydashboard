<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="login-card">
    <h2>Secure Access Portal</h2>

    <input type="email"
           id="email"
           placeholder="Email address">

    <input type="password"
           id="password"
           placeholder="Password">

    <button onclick="login()">Sign In</button>

    <h3 id="message"></h3>
</div>

<script src="login.js"></script>

</body>
</html>
